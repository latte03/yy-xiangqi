name: release-app

on:
  workflow_dispatch:
    inputs:
      version:
        description: App version, for example 0.2.0
        required: true
      app_tag:
        description: Stable app release tag used by the updater
        required: true
        default: app-latest
      model_tag:
        description: Model release tag to bundle into the app
        required: true
        default: models-latest
      draft:
        description: Create/update the GitHub Release as draft
        type: boolean
        default: true
      prerelease:
        description: Mark the GitHub Release as prerelease
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform }}
    env:
      APP_UPDATE_ENDPOINT: https://github.com/${{ github.repository }}/releases/download/${{ inputs.app_tag }}/latest.json
      XIANGQI_MODELS_MANIFEST: https://github.com/${{ github.repository }}/releases/download/${{ inputs.model_tag }}/models.json
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend packaging dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Download bundled model package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p backend/models
          gh release download "${{ inputs.model_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern piece_classifier.onnx \
            --pattern board_locator.onnx \
            --pattern models.json \
            --pattern version.json \
            --dir backend/models \
            --clobber

      - name: Prepare Tauri release config
        shell: bash
        run: |
          node scripts/prepare-tauri-release.mjs \
            --version="${{ inputs.version }}" \
            --app-endpoint="$APP_UPDATE_ENDPOINT" \
            --pubkey="${{ vars.TAURI_UPDATER_PUBKEY }}"

      - name: Build Python sidecar
        shell: bash
        run: scripts/build-sidecar.sh "${{ matrix.target }}"

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.app_tag }}
          releaseName: "Xiangqi Endgame v${{ inputs.version }}"
          releaseBody: "Desktop app v${{ inputs.version }}."
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}
