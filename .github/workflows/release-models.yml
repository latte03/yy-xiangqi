name: release-models

on:
  workflow_dispatch:
    inputs:
      version:
        description: Numeric model package version, for example 3
        required: true
      piece_url:
        description: HTTPS URL to piece_classifier.onnx
        required: true
      locator_url:
        description: HTTPS URL to board_locator.onnx
        required: true
      tag:
        description: Stable model release tag used by the app
        required: true
        default: models-latest
      prerelease:
        description: Mark GitHub Release as prerelease
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    name: publish model package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download ONNX assets
        run: |
          mkdir -p backend/models
          curl --fail --location --retry 3 --output backend/models/piece_classifier.onnx "${{ inputs.piece_url }}"
          curl --fail --location --retry 3 --output backend/models/board_locator.onnx "${{ inputs.locator_url }}"

      - name: Write manifest
        run: |
          node scripts/write-models-manifest.mjs \
            --version="${{ inputs.version }}" \
            --repo="${{ github.repository }}" \
            --tag="${{ inputs.tag }}" \
            --dir=backend/models

      - name: Create or update model release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ inputs.tag }}" \
              --title "Model package v${{ inputs.version }}" \
              --notes "Model package v${{ inputs.version }}." \
              "${flags[@]}"
          else
            gh release create "${{ inputs.tag }}" \
              --title "Model package v${{ inputs.version }}" \
              --notes "Model package v${{ inputs.version }}." \
              "${flags[@]}"
          fi
          gh release upload "${{ inputs.tag }}" \
            backend/models/piece_classifier.onnx \
            backend/models/board_locator.onnx \
            backend/models/models.json \
            backend/models/version.json \
            --clobber
