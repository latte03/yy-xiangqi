name: release-models

on:
  workflow_dispatch:
    inputs:
      piece_url:
        description: Optional HTTPS URL to piece_classifier.onnx; leave empty to use backend/models
        required: false
        default: ""
      locator_url:
        description: Optional HTTPS URL to board_locator.onnx; leave empty to use backend/models
        required: false
        default: ""
      tag:
        description: Stable model release tag used by the app
        required: true
        default: models-latest
      prerelease:
        description: Mark GitHub Release as prerelease
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: publish model package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download ONNX assets
        if: inputs.piece_url != '' || inputs.locator_url != ''
        run: |
          if [[ -z "${{ inputs.piece_url }}" || -z "${{ inputs.locator_url }}" ]]; then
            echo "piece_url and locator_url must either both be set or both be empty." >&2
            exit 1
          fi
          mkdir -p backend/models
          curl --fail --location --retry 3 --output backend/models/piece_classifier.onnx "${{ inputs.piece_url }}"
          curl --fail --location --retry 3 --output backend/models/board_locator.onnx "${{ inputs.locator_url }}"

      - name: Write manifest
        run: |
          node scripts/write-models-manifest.mjs \
            --repo="${{ github.repository }}" \
            --tag="${{ inputs.tag }}" \
            --dir=backend/models

      - name: Create or update model release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          MODEL_VERSION="$(node -p 'require("./backend/models/version.json").version')"
          flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ inputs.tag }}" \
              --title "Model package v${MODEL_VERSION}" \
              --notes "Model package v${MODEL_VERSION}." \
              "${flags[@]}"
          else
            gh release create "${{ inputs.tag }}" \
              --title "Model package v${MODEL_VERSION}" \
              --notes "Model package v${MODEL_VERSION}." \
              "${flags[@]}"
          fi
          gh release upload "${{ inputs.tag }}" \
            backend/models/piece_classifier.onnx \
            backend/models/board_locator.onnx \
            backend/models/models.json \
            backend/models/labels.txt \
            backend/models/version.json \
            --clobber
